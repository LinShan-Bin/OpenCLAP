# QwenAR (CLAP-VLA stage-3, autoregressive) training config.
#
# Port of clap/configs/clap-s3-l32.yaml to the starVLA framework / datasets /
# trainer schema. The action head is pure next-token-prediction over <ACT_*>
# tokens — no flow-matching expert, no KL term, no LoRA.
run_id: clap_s3_l32_qwen3vl4b_pretrain
run_root_dir: ckpts/Checkpoints
seed: 42
wandb_entity: LinShan
wandb_project: starVLA_OpenCLAP
is_debug: false
version_id: "0.1"

framework:
  name: QwenAR

  qwenvl:
    base_vlm: ./pretrained/Qwen3-VL-4B-Instruct
    qwen_vl_variant: qwen3
    attn_implementation: flash_attention_2

  tokenizer:
    # Stage-3 CLAP-VLA loads the *stage-2* CLAP encoder and freezes it.
    clap_ckpt: ./clap/ckpts/clap-s2-l32/last.ckpt
    clap_chunk_size: 32
    num_t_codes: 8        # 8 codes per arm → 16 ACT_* tokens for dual-arm
    visual_t_codes: 8
    num_latents: 512      # codebook size
    model_dim: 768
    latent_dim: 128
    action_vae_dim: 512
    action_dim_per_arm: 7
    patch_size: 16
    enc_blocks: 12
    dec_blocks: 12
    num_heads: 12
    dropout: 0.0
    image_channels: 3
    dino_model_type: dinov3
    dino_model_variant: dinov3_vitb16
    dino_model_path: ./pretrained/dinov3
    dino_weights_path: ./pretrained/dinov3/dinov3_vitb16_pretrain_lvd1689m-73cec8be.pth

  flags:
    init_new_token_embeddings: true
    use_wrist_camera: true
    drop_wrist_prob: 0.5
    drop_state_prob: 0.5
    single_arm: false
    single_arm_layout: single_right
    max_new_tokens: 512

datasets:
  vla_data:
    dataset_py: lerobot_datasets
    data_mix: astribot_pretrain_pnp_daxiong
    data_root_dir: ./data/astribot_pretrain
    per_device_batch_size: 4
    video_backend: torchvision_av

trainer:
  max_train_steps: 800000
  num_warmup_steps: 1000
  save_interval: 5000
  eval_interval: 100
  learning_rate:
    base: 5.0e-05
    qwen_vl_interface: 5.0e-05
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-05
  freeze_modules: ''
  logging_frequency: 100
  gradient_clipping: 1.0

  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-02
